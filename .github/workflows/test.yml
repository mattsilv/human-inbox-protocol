name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pinned to 24: better-sqlite3@11's native addon does not build on Node 26
          # (removed V8 APIs). Bump alongside a better-sqlite3 upgrade to ^12.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
